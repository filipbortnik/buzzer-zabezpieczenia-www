# Nginx SEO baseline for buzzer-zabezpieczenia.pl
# Place in: /etc/nginx/sites-available/buzzer (adapt cert paths if needed)

server {
    listen 80;
    listen [::]:80;
    server_name buzzer-zabezpieczenia.pl www.buzzer-zabezpieczenia.pl;
    return 301 https://buzzer-zabezpieczenia.pl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.buzzer-zabezpieczenia.pl;

    ssl_certificate /etc/letsencrypt/live/buzzer-zabezpieczenia.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buzzer-zabezpieczenia.pl/privkey.pem;

    return 301 https://buzzer-zabezpieczenia.pl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name buzzer-zabezpieczenia.pl;

    root /var/www/buzzer;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/buzzer-zabezpieczenia.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buzzer-zabezpieczenia.pl/privkey.pem;

    # Enforce one URL style and avoid duplicate content.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
